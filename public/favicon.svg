         L 59,96
         C 59,101 54,105 49,105
         L 49,112
         C 52,112 55,115 55,120
         L 55,145
         C 55,148 61,155 68,160
         L 81,126
         L 81,105
         L 94,92
         L 94,48
         Z" 
      fill="url(#invictus-gold-grad)" 
    />
    <path
      d="M 49,118
         L 41,126
         L 49,134
         Z"
      fill="url(#invictus-gold-grad)"
    />
    <path
      d="M 94,22
         L 81,32
         L 94,40
         Z"
      fill="url(#invictus-gold-grad)"
    />

    <!-- RIGHT HALF OF THE SPARTAN HELMET -->
    <path 
      d="M 106,36 
         L 119,36 
         C 126,48 141,57 141,57
         L 141,96
         C 141,101 146,105 151,105
         L 151,112
         C 148,112 145,115 145,120
         L 145,145
         C 145,148 139,155 132,160
         L 119,126
         L 119,105
         L 106,92
         L 106,48
         Z" 
      fill="url(#invictus-gold-grad)" 
    />
    <path
      d="M 151,118
         L 159,126
         L 151,134
         Z"
      fill="url(#invictus-gold-grad)"
    />
    <path
      d="M 106,22
         L 119,32
         L 106,40
         Z"
      fill="url(#invictus-gold-grad)"
    />

    <!-- Central Crest Cap (Split top) -->
    <path
      d="M 94,10 
         L 94,18
         L 88,18
         Z"
      fill="url(#invictus-gold-grad)"
    />
    <path
      d="M 106,10 
         L 106,18
         L 112,18
         Z"
